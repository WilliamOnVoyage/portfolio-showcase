<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#070B0E"/>
  
  <defs>
    <!-- Gradients matching the slate/Thinking Lab aesthetic -->
    <linearGradient id="topArchGrad" x1="143" y1="148" x2="369" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="bottomArchGrad" x1="143" y1="364" x2="369" y2="364" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="leftPillarGrad" x1="211" y1="162" x2="211" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="rightPillarGrad" x1="301" y1="162" x2="301" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
  </defs>

  <!-- Connections (Thin, 1.5px lines, balanced mid-point proportions) -->
  <path d="M 143 148 Q 256 182 369 148" stroke="url(#topArchGrad)" stroke-width="1.5" fill="none"/>
  <path d="M 143 364 Q 256 330 369 364" stroke="url(#bottomArchGrad)" stroke-width="1.5" fill="none"/>
  
  <line x1="211" y1="162" x2="211" y2="350" stroke="url(#leftPillarGrad)" stroke-width="1.5"/>
  <line x1="301" y1="162" x2="301" y2="350" stroke="url(#rightPillarGrad)" stroke-width="1.5"/>

  <!-- Endpoints (4 small dots, radius 6px) -->
  <circle cx="143" cy="148" r="6" fill="#93C5FD" stroke="#070B0E" stroke-width="1.5"/>
  <circle cx="369" cy="148" r="6" fill="#E2E8F0" stroke="#070B0E" stroke-width="1.5"/>
  <circle cx="143" cy="364" r="6" fill="#E2E8F0" stroke="#070B0E" stroke-width="1.5"/>
  <circle cx="369" cy="364" r="6" fill="#93C5FD" stroke="#070B0E" stroke-width="1.5"/>

  <!-- Connection Points (4 larger dots, radius 11px) -->
  <circle cx="211" cy="162" r="11" fill="#93C5FD" stroke="#070B0E" stroke-width="2"/>
  <circle cx="301" cy="162" r="11" fill="#E2E8F0" stroke="#070B0E" stroke-width="2"/>
  <circle cx="211" cy="350" r="11" fill="#E2E8F0" stroke="#070B0E" stroke-width="2"/>
  <circle cx="301" cy="350" r="11" fill="#93C5FD" stroke="#070B0E" stroke-width="2"/>
</svg>
